text-color=#D4D4D4
background-color=#1E1E1E
width=420
height=110
padding=10
border-size=3
border-radius=0
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32

border-color=#E742E7

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

[urgency=low]
border-color=#858585
default-timeout=3000

[urgency=normal summary~="[Ww]arning|[Aa]lert|[Aa]ttention"]
border-color=#CFCF2A

[urgency=critical]
border-color=#FF4949
default-timeout=0
